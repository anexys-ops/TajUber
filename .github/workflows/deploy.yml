name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy (rsync + Docker Compose)
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_REMOTE_DIR: ${{ secrets.DEPLOY_REMOTE_DIR }}
          DEPLOY_ENV: ${{ secrets.DEPLOY_ENV }}
        run: |
          set -euo pipefail
          : "${DEPLOY_SSH_KEY:?Secret DEPLOY_SSH_KEY manquant}"
          : "${DEPLOY_HOST:?Secret DEPLOY_HOST manquant}"
          : "${DEPLOY_USER:?Secret DEPLOY_USER manquant}"
          : "${DEPLOY_ENV:?Secret DEPLOY_ENV manquant (contenu multiligne de deploy/env.prod)}"

          bash scripts/bump-app-version.sh
          APP_VERSION=$(tr -d ' \r\n' < version.txt)
          echo "Version déployée: ${APP_VERSION}"

          PORT="${DEPLOY_PORT:-166}"
          REMOTE_DIR="${DEPLOY_REMOTE_DIR:-/opt/taj-platform}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          umask 077
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          SSH=(ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=accept-new)
          RSYNC_SSH="ssh -i $HOME/.ssh/deploy_key -p $PORT -o StrictHostKeyChecking=accept-new"

          rsync -avz \
            -e "$RSYNC_SSH" \
            --exclude node_modules \
            --exclude .git \
            --exclude "**/.next" \
            --exclude "**/dist" \
            --exclude .turbo \
            --exclude deploy/env.prod \
            --exclude "*.log" \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${REMOTE_DIR}/"

          RDIR=$(printf '%q' "$REMOTE_DIR")
          echo "$DEPLOY_ENV" | "${SSH[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "umask 077; mkdir -p ${RDIR}/deploy; cat > ${RDIR}/deploy/env.prod"

          "${SSH[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "set -euo pipefail; cd ${RDIR}; export APP_VERSION='${APP_VERSION}'; \
            docker compose -f docker-compose.prod.yml --env-file deploy/env.prod build; \
            docker compose -f docker-compose.prod.yml --env-file deploy/env.prod up -d; \
            docker compose -f docker-compose.prod.yml --env-file deploy/env.prod ps"

          rm -f ~/.ssh/deploy_key
