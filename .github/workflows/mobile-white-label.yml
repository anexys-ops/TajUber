# Vérification TypeScript des apps Expo (white-label).
# Builds store par tenant : ajouter des profils EAS (`eas build`) avec `APP_VARIANT` / `extra.tenantSlug`.
name: mobile-white-label

on:
  workflow_dispatch:
  push:
    paths:
      - "apps/mobile/**"
      - "apps/mobile-kitchen/**"
      - "apps/mobile-driver/**"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - "@taj/mobile"
          - "@taj/mobile-kitchen"
          - "@taj/mobile-driver"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm --filter "${{ matrix.package }}" exec tsc --noEmit
