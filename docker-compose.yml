services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: taj
      POSTGRES_PASSWORD: taj
      POSTGRES_DB: taj
    volumes:
      - taj_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://taj:taj@postgres:5432/taj?schema=public
      JWT_SECRET: docker-dev-secret
      PRINT_AGENT_SECRET: print-docker-secret
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://localhost:3040,http://localhost:3041
    depends_on:
      - postgres
      - redis

volumes:
  taj_pg:
