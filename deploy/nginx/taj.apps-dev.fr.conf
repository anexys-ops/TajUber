# HTTP — ajoutez TLS (certbot) une fois le DNS en place.
# Résolution Docker (127.0.0.11) + proxy_pass avec variables : après un
# `docker compose up` qui recrée les conteneurs, les IP ne sont plus figées
# (sinon 502 « connection refused » vers d’anciennes IP).
# Protocole vu par Next/Nest : si un reverse externe termine le TLS et envoie
# X-Forwarded-Proto: https, ne pas l’écraser avec $scheme (souvent http).
map $http_x_forwarded_proto $taj_forwarded_proto {
    ""      $scheme;
    default $http_x_forwarded_proto;
}

server {
    listen 80;
    server_name taj.apps-dev.fr;

    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 12m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        set $taj_api_upstream api;
        proxy_pass http://$taj_api_upstream:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $taj_forwarded_proto;
    }

    location /socket.io/ {
        set $taj_api_upstream api;
        proxy_pass http://$taj_api_upstream:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $taj_forwarded_proto;
    }

    location /stripe/ {
        set $taj_api_upstream api;
        proxy_pass http://$taj_api_upstream:3001/stripe/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $taj_forwarded_proto;
        proxy_request_buffering off;
    }

    location /uploads/ {
        set $taj_api_upstream api;
        proxy_pass http://$taj_api_upstream:3001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $taj_forwarded_proto;
    }

    location = /pos {
        return 302 /pos/;
    }

    # Alias lisible vers la caisse (même app que /pos/)
    location = /commandes {
        return 302 /pos/;
    }

    location /pos/ {
        set $taj_pos_upstream web-pos;
        proxy_pass http://$taj_pos_upstream:3041;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $taj_forwarded_proto;
    }

    location / {
        set $taj_admin_upstream web-admin;
        proxy_pass http://$taj_admin_upstream:3040;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $taj_forwarded_proto;
    }
}
