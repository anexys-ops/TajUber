# Production : docker compose -f docker-compose.prod.yml --env-file deploy/env.prod up -d --build
name: taj-platform

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taj}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-taj}
    volumes:
      - taj_pg_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taj} -d ${POSTGRES_DB:-taj}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-taj}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-taj}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://taj.apps-dev.fr}
      PORT: "3001"
      APP_VERSION: ${APP_VERSION:-dev}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      PRINT_AGENT_SECRET: ${PRINT_AGENT_SECRET:-}
    volumes:
      - taj_uploads:/repo/apps/api/uploads
    depends_on:
      postgres:
        condition: service_healthy

  web-admin:
    build:
      context: .
      dockerfile: apps/web-admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://taj.apps-dev.fr/api}
        NEXT_PUBLIC_WEB_POS_URL: ${NEXT_PUBLIC_WEB_POS_URL:-https://taj.apps-dev.fr/pos}
        NEXT_PUBLIC_TENANT_SLUG: ${NEXT_PUBLIC_TENANT_SLUG:-taj-poulet-demo}
        NEXT_PUBLIC_APP_VERSION: ${APP_VERSION:-dev}
    restart: unless-stopped
    environment:
      PORT: "3040"
      HOSTNAME: 0.0.0.0
    depends_on:
      - api

  web-pos:
    build:
      context: .
      dockerfile: apps/web-pos/Dockerfile
      args:
        NEXT_PUBLIC_POS_BASE_PATH: /pos
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://taj.apps-dev.fr/api}
        NEXT_PUBLIC_TENANT_SLUG: ${NEXT_PUBLIC_TENANT_SLUG:-taj-poulet-demo}
        NEXT_PUBLIC_APP_VERSION: ${APP_VERSION:-dev}
    restart: unless-stopped
    environment:
      PORT: "3041"
      HOSTNAME: 0.0.0.0
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/taj.apps-dev.fr.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - api
      - web-admin
      - web-pos

volumes:
  taj_pg_prod:
  taj_uploads:
  certbot_www:
